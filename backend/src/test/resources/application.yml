spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Use a mock/disable active Redis connection checks on startup if any
  data:
    redis:
      repositories:
        enabled: false

# Custom properties for S3 and JWT
lms:
  security:
    jwt:
      private-key-path: classpath:keys/private.pem
      public-key-path: classpath:keys/public.pem
  s3:
    bucket-name: test-bucket
    region: us-east-1
    access-key: test-access-key
    secret-key: test-secret-key
